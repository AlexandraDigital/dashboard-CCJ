name = "golden-bakery-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# Cloudflare Pages Project Configuration
# This should be deployed as part of a Cloudflare Pages project

# D1 Database Binding (SQLite)
[[d1_databases]]
binding = "DB"
database_name = "golden-bakery-db"
database_id = "66055860-b14b-43be-a465-3d76449127f3" # Get this after creating the D1 database

# Environment variables
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# Triggers for scheduled tasks (optional)
# Uncomment if you want to clean up old redeemed codes periodically
# [[triggers.crons]]
# crons = ["0 0 * * 0"] # Weekly cleanup at midnight Sunday
